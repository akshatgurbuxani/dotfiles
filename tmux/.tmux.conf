# ~/.tmux.conf

##########################
# BASIC SETTINGS
##########################

# Enable mouse support (click, resize, select panes)
set -g mouse on

# Use 256 colors (works perfectly on modern Mac terminals)
set -g default-terminal "screen-256color"

# True color support for some Mac terminals (optional)
set -as terminal-overrides ',xterm-256color:Tc'

# Increase scrollback history
set -g history-limit 10000

# Reload tmux config quickly
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | (horizontal) and - (vertical)
bind | split-window -h
bind - split-window -v

# Easy pane navigation with Alt (Option) + arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

##########################
# PLUGIN SETTINGS (TPM)
##########################

# List of plugins
set -g @plugin 'tmux-plugins/tpm'             # TPM itself
set -g @plugin 'tmux-plugins/tmux-sensible'  # sane defaults
set -g @plugin 'tmux-plugins/tmux-yank'      # copy to macOS clipboard

# Other examples (optional):
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
